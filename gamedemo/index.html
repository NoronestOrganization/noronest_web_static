<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Demo</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #222; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
      }

      .game-container {
        position: relative;
        width: 100%;           
        max-width: 960px;       
        aspect-ratio: 960 / 600; 
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* The personalized watermark */
      #watermark {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.3); 
        font-size: clamp(1.5rem, 4vw, 3rem); 
        font-weight: bold;
        text-align: center;
        pointer-events: none; 
        z-index: 10; 
        user-select: none; 
        white-space: nowrap;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>

    <!-- Visual layout -->
    <div class="game-container">
      <canvas id="unity-canvas" width="960" height="600"></canvas>
      <div id="watermark">Loading...</div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const testerName = urlParams.get('tester');
      const watermarkElement = document.getElementById('watermark');

      if (testerName) {
          watermarkElement.innerText = "Nöronest Demo - " + testerName;
      } else {
          watermarkElement.innerText = "HATALI KULLANICI";
      }
    </script>

    <!-- Unity Loader Script updated for Build "2" -->
    <script src="Build/2.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      
      var buildUrl = "Build";
      var config = {
        dataUrl: buildUrl + "/2.data",          
        frameworkUrl: buildUrl + "/2.framework.js",
        codeUrl: buildUrl + "/2.wasm",          
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Noro",
        productName: "AlzheimerApp",
        productVersion: "1.0",
      };

      createUnityInstance(canvas, config, (progress) => {
      }).then((unityInstance) => {
          console.log("Game loaded successfully.");
      }).catch((message) => {
          alert(message);
      });
    </script>

  </body>
</html>
